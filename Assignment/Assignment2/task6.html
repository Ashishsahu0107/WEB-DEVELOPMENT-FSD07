<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Nested Unordered List </h2>
    <ul>
        <li>Main Category 1
            <ul type="circle">
                <li>Subcategory 1.1</li>
                <li>Subcategory 1.2</li>
            </ul>
        </li>
        <li>Main Category 2
             <ul type="circle">
                <li>Subcategory 2.1</li>
                <li>Subcategory 2.2</li>
            </ul>
        </li>
    </ul>

    <h2>Nested Ordered List with Start Attributes</h2>
    <ul>
        <li>Web Development
            <ol type="1">
                <li>HTML</li>
                <li>CSS
                    <ul type="square">
                        <li>Flexbox</li>
                        <li>Grid</li>
                    </ul>
                </li>
                <li>JavaScript</li>
            </ol>
        </li>
    </ul>
</body>
</html>
