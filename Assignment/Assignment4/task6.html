<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <table border="1">
        <tr>
          <th>Name:</th>
          <td><input type="text" name="" id="" /></td>
        </tr>
        <tr>
          <th>IC No:</th>
          <td>
            <input type="text" name="" id="" />- <input type="text" />-
            <input type="text" />
          </td>
        </tr>
        <tr>
          <th>Address:</th>
          <td>
            <textarea name="" id="" rows="6" cols="80"></textarea>
          </td>
        </tr>
        <tr>
          <th>Gender:</th>
          <td>
            <input type="radio" name="" id="" /><span>Male</span>
            <input type="radio" name="" id="" /><span>Female</span>
          </td>
        </tr>
        <tr>
          <th>Dance Type:</th>
          <td>
            <input type="checkbox" name="" id="" /><span>Zapin</span>
            <input type="checkbox" name="" id="" /><span>Joget</span>
            <input type="checkbox" name="" id="" /><span>Inang</span>
            <input type="checkbox" name="" id="" /><span>Lion Dance</span>
          </td>
        </tr>
        <tr>
          <th>Competition:</th>
          <td>
            <select name="level" size="3">
              <option>State Level</option>
              <option>National Level</option>
              <option>International Level</option>
            </select>
          </td>
        </tr>
        <tr>
          <th>Nationality:</th>
          <td>
            <select>
              <option value="">-please select</option>
            </select>
          </td>
        </tr>
        <tr>
          <th>Password:</th>
          <td><input type="password" name="" id="" /></td>
        </tr>
      </table>
      <button type="button">Regitster Me</button>
      <button type="button">Cencel</button>
    </form>
  </body>
</html>
