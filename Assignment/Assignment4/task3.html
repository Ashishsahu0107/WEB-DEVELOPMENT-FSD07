<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Registration Form</h1>
    <form>
      <span><b>First Name : </b></span>
      <input type="text" name="" id="" placeholder="Enter First Name" /><br />
      
      <span><b>Last Name : </b></span>
      <input type="text" name="" id="" placeholder="Enter Last Name" /><br />

      <span><b>Email : </b></span>
      <input type="email" name="" id="" placeholder="Enter Email Address" /><br />

      <span><b>Password : </b></span>
      <input type="password" name="" id="" /><br />

      <span><b>Gender : </b></span><br>
      <span for="male"><b>Male</b></span>
      <input type="radio" name="gender" id="male"><br>

      <span><b>Female</b></span>
      <input type="radio" name="gender" id="female"><br>

      <span><b>Other</b></span>
      <input type="radio" name="gender" id="other"><br>

      <span><b>Age: </b></span>
      <input type="number" name="age" id="age"><br>
      
      <span><b>Preferences: </b></span><br>
      <span><b>Acrylic Painting: </b></span>
      <input type="checkbox"><br>
      <span><b>Oil Painting: </b></span>
      <input type="checkbox"><br>
      <span><b>Water Color Painting: </b></span>
      <input type="checkbox"><br>

      <label for="occupation">Select Occuption</label>
      <select name="occupation" id="occupation">
        <option value="">Student</option>
        <option value="">Engineer</option>
        <option value="">Teacher</option>
        <option value="">Businessman</option>
        <option value="">Farmer</option>
        <option value="">Other</option>
      </select><br>

      <label for="bio">Bio</label>
      <textarea name="bio" id="bio" placeholder="Share few lines about yourself" rows="10" cols="27"></textarea><br>
      <button type="reset">RESET</button>
      <button type="submit">SUBMIT</button>
      
    </form>
  </body>
</html>
