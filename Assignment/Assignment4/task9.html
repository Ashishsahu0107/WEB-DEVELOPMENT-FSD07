<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 09</title>
  </head>
  <body>
    <fieldset>
        <h1>Pizza Order Form</h1>
        <form>
            <span>First Name</span> <input type="text"><br><br>
            <span>Last Name</span> <input type="text"><br><br>
            <span>Email Address</span> <input type="email"><br><br>
            <span>Contact Number</span> <input type="tel"><br><br>
            <span>Preferred Delivery Date</span> <input type="date"><br><br>
            <span>Size: </span><br>
            <input type="radio" name="size">Small
            <input type="radio" name="size">Medium
            <input type="radio" name="size">Large


            <div>
                <span>Flovor: </span><br>
                <input type="checkbox"> Hawaiian (Php 150.00) 
                <select>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
            </div>
            <div>
                <input type="checkbox"> Pepperoni (Php 140.00) 
                <select>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
            </div>
            <div>
                <input type="checkbox"> Vegetable (Php 130.00) 
                <select>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
            </div><br>
            <span>Credit Card Number: </span><input type="text"><br><br>
            <span>PIN</span> <input type="text">
            <br>
            <span>Assitional Note: </span><br>
            <textarea name="" id="" rows="6" cols="30"></textarea><br><br>
            <button type="submit">Submit Order</button>
        </form>
    </fieldset>
  </body>
</html>
