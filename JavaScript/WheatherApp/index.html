<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
      body {
        background: radial-gradient(circle at top, rgba(46, 134, 255, 0.22), transparent 25%),
          linear-gradient(180deg, #0b1220 0%, #0f1c39 47%, #1b2c56 100%);
        min-height: 100vh;
        color: #f4f7ff;
      }
      .weather-card {
        background: rgba(18, 41, 85, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
      }
      .weather-card .card-body {
        padding: 2rem;
      }
      .weather-card h1 {
        letter-spacing: 0.08em;
      }
      .weather-card__subtitle {
        color: #cbd5e1;
      }
      .form-control,
      .btn {
        min-height: 3.25rem;
      }
      .weather-info {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1.25rem;
      }
      .weather-info .row > div {
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }
      .weather-info .row > div:last-child {
        border-right: none;
      }
      .weather-icon {
        font-size: 3rem;
        line-height: 1;
      }
      .small-text {
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-xl-5 col-lg-6 col-md-8">
          <div class="card weather-card shadow-xl">
            <div class="card-body">
              <div class="text-center mb-4">
                <h1 class="h2 mb-2">Weather Dashboard</h1>
                <p class="weather-card__subtitle mb-0">Fast, clean and professional weather lookup for any city.</p>
              </div>

              <div class="input-group mb-4 shadow-sm">
                <input
                  type="text"
                  class="form-control border-0 bg-white bg-opacity-10 text-black"
                  id="cityName"
                  placeholder="Search city, e.g. Mumbai"
                  aria-label="City name"
                />
                <button class="btn btn-primary px-4" type="button" id="searchBtn" onclick="getWheather()">
                  Check
                </button>
              </div>

              <div id="weatherSection" class="weather-info p-4 d-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <div>
                    <h2 id="cityOutput" class="h4 mb-1">City Name</h2>
                    <p id="descOutput" class="small-text mb-0">Clear sky</p>
                  </div>
                  <div class="text-end">
                    <div class="weather-icon">☀️</div>
                    <p class="small-text mb-0" id="dateOutput"></p>
                  </div>
                </div>

                <div class="d-flex align-items-end justify-content-between mb-4">
                  <div>
                    <span id="tempOutput" class="display-5 fw-bold">0°C</span>
                  </div>
                  <div class="text-end small-text">
                    <p class="mb-1">Feels like <span id="feelsLikeOutput">0°C</span></p>
                    <p class="mb-0">Country <span id="countryOutput">IN</span></p>
                  </div>
                </div>

                <div class="row text-center text-white-50 gy-3">
                  <div class="col-4">
                    <div class="fw-semibold">Humidity</div>
                    <div id="humidityOutput">0%</div>
                  </div>
                  <div class="col-4">
                    <div class="fw-semibold">Wind</div>
                    <div id="windOutput">0 m/s</div>
                  </div>
                  <div class="col-4">
                    <div class="fw-semibold">Pressure</div>
                    <div id="pressureOutput">0 hPa</div>
                  </div>
                </div>
              </div>

              <p class="text-center small-text mt-4 mb-0">Built using Bootstrap and OpenWeatherMap API.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
