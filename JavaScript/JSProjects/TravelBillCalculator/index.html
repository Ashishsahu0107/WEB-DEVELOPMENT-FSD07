<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Bill Calculator</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="text-center mb-4">
          <h1 class="display-6 fw-bold text-primary">Travel Bill Calculator</h1>
          <p class="text-muted mb-0">Calculate your total fare and slab-wise breakdown.</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <form id="travelForm" novalidate>
              <div class="mb-3">
                <label for="km" class="form-label fw-semibold">Kilometers covered</label>
                <input
                  id="km"
                  name="km"
                  type="number"
                  inputmode="decimal"
                  step="any"
                  min="0"
                  class="form-control form-control-lg"
                  placeholder="e.g., 50 or 100.5"
                />
                <div id="kmError" class="invalid-feedback d-block"></div>
              </div>

              <button id="calcBtn" type="submit" class="btn btn-primary btn-lg w-100 py-2">
                Calculate Bill
              </button>
            </form>

            <div class="mt-4">
              <div id="resultCard" class="result-card p-3 p-md-4 rounded-4 border bg-white d-none">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                  <h2 class="h4 mb-0 fw-bold">Total Bill = <span id="totalBill">Rs. 0</span></h2>
                </div>

                <hr class="my-3" />

                <h3 class="h6 text-uppercase text-muted mb-2">Breakdown</h3>
                <div id="breakdown" class="breakdown-list small text-body"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="text-center mt-3 text-muted small">
          Slabs: 0–10 @ Rs.11/km, 10–30 @ Rs.10/km, 30+ @ Rs.8/km
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App JS -->
  <script src="script.js"></script>
</body>
</html>
