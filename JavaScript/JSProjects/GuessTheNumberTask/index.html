<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main">
        <div class="card">
            <h2>Guess The Number Task</h2>
            <p>We have selected a random number between 1 - 10. See if you can guess it.</p>

            <div class="controls">
                <label for="guess">Enter your guess (1-10):</label>
                <input id="guess" type="number" min="1" max="10" placeholder="Type a number" />
                <button id="submitBtn" type="button">Submit</button>
            </div>

            <p id="message" class="message" aria-live="polite"></p>
        </div>
    </div>




    <script src="./script.js"></script>
    
</body>
</html>
