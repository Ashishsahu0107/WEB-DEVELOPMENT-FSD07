<!doctype html>
<html>
  <head>
    <title>Assignment 1</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <!-- No Tailwind needed, only Bootstrap for best UI -->
  </head>
  <body
    class="min-vh-100 d-flex align-items-center"
    style="
      background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%);
      min-height: 100vh;
    "
  >
    <div class="container py-5">
      <div class="row justify-content-center g-4">
        <!-- First Card -->
        <div class="col-md-4">
          <div
            class="card shadow-lg rounded-4 border-0 h-100 bg-white bg-opacity-75 position-relative overflow-hidden"
          >
            <div
              class="position-absolute top-0 end-0 m-3 opacity-25"
              style="font-size: 3rem; pointer-events: none"
            >
              <i class="bi bi-person-circle text-primary"></i>
            </div>
            <div class="card-body p-5 rounded-4">
              <h5 class="card-title mb-4 text-center fw-bold text-primary">
                <i class="bi bi-person-fill me-2"></i>Personal Info
              </h5>
              <form autocomplete="off">
                <div class="mb-3">
                  <label for="name" class="form-label">Name</label>
                  <input
                    type="text"
                    id="name"
                    class="form-control shadow-sm"
                    placeholder="Enter your name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="city" class="form-label">City</label>
                  <input
                    type="text"
                    id="city"
                    class="form-control shadow-sm"
                    placeholder="Enter your city"
                    required
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-primary w-100 fw-semibold shadow"
                  onclick="showData()"
                >
                  <i class="bi bi-send me-1"></i>Submit
                </button>
                <div id="result1" class="mt-3"></div>
              </form>
            </div>
          </div>
        </div>
        <!-- Second Card -->
        <div class="col-md-4">
          <div
            class="card shadow-lg rounded-4 border-0 h-100 bg-white bg-opacity-75 position-relative overflow-hidden"
          >
            <div
              class="position-absolute top-0 end-0 m-3 opacity-25"
              style="font-size: 3rem; pointer-events: none"
            >
              <i class="bi bi-shield-lock text-success"></i>
            </div>
            <div class="card-body p-5 rounded-4">
              <h5 class="card-title mb-4 text-center fw-bold text-success">
                <i class="bi bi-shield-lock-fill me-2"></i>Login
              </h5>
              <form autocomplete="off">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control shadow-sm"
                    placeholder="Enter your email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    id="password"
                    class="form-control shadow-sm"
                    placeholder="Enter your password"
                    required
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-success w-100 fw-semibold shadow"
                  onclick="submitForm()"
                >
                  <i class="bi bi-box-arrow-in-right me-1"></i>Submit
                </button>
                <div id="result2" class="mt-3"></div>
              </form>
            </div>
          </div>
        </div>
        <!-- Third Card -->
        <div class="col-md-4">
          <div
            class="card shadow-lg rounded-4 border-0 h-100 bg-white bg-opacity-75 position-relative overflow-hidden"
          >
            <div
              class="position-absolute top-0 end-0 m-3 opacity-25"
              style="font-size: 3rem; pointer-events: none"
            >
              <i class="bi bi-card-text text-danger"></i>
            </div>
            <div class="card-body p-5 rounded-4">
              <h5 class="card-title mb-4 text-center fw-bold text-danger">
                <i class="bi bi-card-text me-2"></i>Full Name
              </h5>
              <form autocomplete="off">
                <div class="mb-3">
                  <label for="fname" class="form-label">First Name</label>
                  <input
                    type="text"
                    id="fname"
                    class="form-control shadow-sm"
                    placeholder="First name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="lname" class="form-label">Last Name</label>
                  <input
                    type="text"
                    id="lname"
                    class="form-control shadow-sm"
                    placeholder="Last name"
                    required
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-danger w-100 fw-semibold shadow"
                  onclick="showFullName()"
                >
                  <i class="bi bi-person-bounding-box me-1"></i>Submit
                </button>
                <div id="result3" class="mt-3"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function showData() {
        const name = document.getElementById("name").value.trim();
        const city = document.getElementById("city").value.trim();
        const result = document.getElementById("result1");
        if (name && city) {
          result.innerHTML = `<div class='alert alert-primary mb-0 d-flex justify-content-between align-items-center'><span><i class='bi bi-person-check me-2'></i>Name: <b>${name}</b>, City: <b>${city}</b></span><button type='button' class='btn-close ms-3' aria-label='Close' onclick='hideResult(1)'></button></div>`;
        } else {
          result.innerHTML = `<div class='alert alert-warning mb-0 d-flex justify-content-between align-items-center'><span><i class='bi bi-exclamation-triangle me-2'></i>Please fill all fields.</span><button type='button' class='btn-close ms-3' aria-label='Close' onclick='hideResult(1)'></button></div>`;
        }
      }

      function submitForm() {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value.trim();
        const result = document.getElementById("result2");
        if (email && pass) {
          // result.innerHTML = `<div class='alert alert-success mb-0 d-flex justify-content-between align-items-center'><span><i class='bi bi-check-circle me-2'></i>Email: <b>${email}</b>, Password: <b>${pass}</b></span><button type='button' class='btn-close ms-3' aria-label='Close' onclick='hideResult(2)'></button></div>`;
          document.body.style.background =
            "linear-gradient(135deg, #d1f7c4 0%, #b7e4c7 100%)";
          setTimeout(() => {
            document.body.style.background =
              "linear-gradient(135deg, #f9d423 0%, #ff4e50 100%)";
          }, 1500);
        } else {
          // result.innerHTML = `<div class='alert alert-warning mb-0 d-flex justify-content-between align-items-center'><span><i class='bi bi-exclamation-triangle me-2'></i>Please fill all fields.</span><button type='button' class='btn-close ms-3' aria-label='Close' onclick='hideResult(2)'></button></div>`;
        }
      }

      function showFullName() {
        const fname = document.getElementById("fname").value.trim();
        const lname = document.getElementById("lname").value.trim();
        const result = document.getElementById("result3");
        if (fname && lname) {
          result.innerHTML = `<div class='alert alert-danger mb-0 d-flex justify-content-between align-items-center'><span><i class='bi bi-person-badge me-2'></i>Fname: <b>${fname}</b> Lname: <b>${lname}</b></span><button type='button' class='btn-close ms-3' aria-label='Close' onclick='hideResult(3)'></button></div>`;
        } else {
          result.innerHTML = `<div class='alert alert-warning mb-0 d-flex justify-content-between align-items-center'><span><i class='bi bi-exclamation-triangle me-2'></i>Please fill all fields.</span><button type='button' class='btn-close ms-3' aria-label='Close' onclick='hideResult(3)'></button></div>`;
        }
      }

      function hideResult(num) {
        const el = document.getElementById(`result${num}`);
        if (el) el.innerHTML = "";
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
