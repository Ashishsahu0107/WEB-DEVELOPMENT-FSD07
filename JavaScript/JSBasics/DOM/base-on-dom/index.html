<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
      <!-- 1 -->
    <h1 id="h1">Hello Student</h1>
     <hr />
    <!-- 2 -->
    <p id="myText">This is original text</p>
    <button onclick="changeText()">Change Text</button>
     <hr />
    <!-- 3 -->
    <h1 id="heading">Hello</h1>
    <button onclick="updateHeading()">Click Me</button>

    <hr />

    <!-- 4 -->
    <p id="para">This is a paragraph</p>
    <button onclick="readParagraph()">Read Paragraph</button>

    <hr />

    <!-- 5 -->
    <div id="box">Old Content</div>
    <button onclick="changeContent()">Change Content</button>

    <hr />

    <!-- 6 -->
    <p id="textChange">Hello</p>
    <button onclick="changeText()">Change Text</button>

    <hr />

    <!-- 7 -->
    <h1 id="h1Change">Heading</h1>
    <p id="pChange">Paragraph</p>
    <button onclick="changeBoth()">Change Both</button>

    <hr />

    <!-- 9 -->
    <div id="parent">
      <p id="child">Nested Text</p>
    </div>
    <button onclick="getNestedText()">Get Nested Text</button>

    <hr />

    <!-- 10 -->
    <p id="dynamic">Click button to update</p>
    <button onclick="dynamicChange()">Update</button>

    <script src="./app.js"></script>
  </body>
</html>
