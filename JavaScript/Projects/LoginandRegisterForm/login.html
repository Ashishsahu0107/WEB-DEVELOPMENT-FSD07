<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
</head>

<body>
    <header>
        <img src="./logo.png" alt="" />
        <button><a href=""></a></button>
    </header>

    <main class="login">
        <div class="login-left">
            <div class="leftText">
                <h1>Login</h1>
                <p>Login to access your travelwise account</p>
                <div class="leftInner">
                    <div class="input">
                        <label for="">Email</label>
                        <input type="email" placeholder="Enter your Email" />
                    </div>
                    <div class="input">
                        <label for="">Password</label>
                        <input type="password" placeholder="Enter your Password" />
                        
                    </div>
                    <div class="remember">
                        <div class="rememberme">
                            <input type="checkbox" name="" id="remember" />
                            <label for="remember">Remember me</label>
                        </div>
                        <div>
                            <a href="./forgot.html">Forgot Password</a>
                        </div>
                    </div>
                    <button class="btn"><a href="#">Login</a></button>
                    <p>Don't have an account <a href="./register.html">Sign up</a></p>
                </div>
                <div id="horizontal-line">
                    <hr>
                    <span>Or login with</span>
                    <hr>
                </div>
                <div class="button">
                    <button> <img class="img1" src="./facebook.png" alt=""><span>FaceBook</span></button>
                    <button> <img class="img2" src="./google.png" alt=""><span>Google</span></button>
                    <button> <img class="img3" src="./apple.png" alt=""><span>Apple</span></button>
                </div>
            </div>
        </div>
        <div class="login-right">
            <img src="./Rectangle 20.png" alt="" />
        </div>
    </main>
</body>

</html>
