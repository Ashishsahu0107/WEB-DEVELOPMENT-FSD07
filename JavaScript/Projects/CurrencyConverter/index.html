<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="text-center mb-4">
        <h1 class="fw-bold">Currency Converter</h1>
        <p class="text-muted mb-0">Convert money between currencies with live rates.</p>
      </div>

      <div class="card shadow-sm converter-card">
        <div class="card-body">
          <div class="row gx-3 gy-4 align-items-end">
            <div class="col-md-5">
              <label for="country1" class="form-label">From</label>
              <div class="flag-select d-flex align-items-center gap-2">
                <img id="flag1" class="flag-img" alt="From country flag" src="" />
                <select id="country1" class="form-select"></select>
              </div>
              <div id="errorFrom" class="form-text text-danger"></div>
            </div>

            <div class="col-md-2 text-center swap-column">
              <button id="swapBtn" type="button" class="btn btn-outline-primary swap-btn" title="Swap currencies">
                ⇄
              </button>
            </div>

            <div class="col-md-5">
              <label for="country2" class="form-label">To</label>
              <div class="flag-select d-flex align-items-center gap-2">
                <img id="flag2" class="flag-img" alt="To country flag" src="" />
                <select id="country2" class="form-select"></select>
              </div>
              <div id="errorTo" class="form-text text-danger"></div>
            </div>
          </div>

          <div class="row gx-3 gy-3 mt-3 align-items-end">
            <div class="col-md-7">
              <label for="orgAmount" class="form-label">Amount</label>
              <input id="orgAmount" type="number" min="0" step="any" class="form-control" placeholder="Enter amount" />
              <div id="errorAmount" class="form-text text-danger"></div>
            </div>
            <div class="col-md-5 d-grid">
              <button id="convertBtn" type="button" class="btn btn-primary btn-lg">Convert</button>
            </div>
          </div>

          <div class="row mt-3">
            <div class="col">
              <div id="message" class="alert alert-danger d-none" role="alert"></div>
            </div>
          </div>

          <div id="resultCard" class="card result-card border-0 mt-4 d-none">
            <div class="card-body px-4 py-3">
              <p class="text-muted mb-1">Converted amount</p>
              <h2 id="newAmount" class="result-value mb-1"></h2>
              <p id="rateText" class="text-secondary mb-0"></p>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-3 text-muted">
        <small>Free, browser-only converter with live exchange rates.</small>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
