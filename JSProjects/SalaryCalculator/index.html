<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Salary Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
              <div>
                <h1 class="h4 mb-1">Salary Calculator</h1>
                <p class="text-muted mb-0">Calculate HRA, DA and Gross Salary using standard rules.</p>
              </div>
            </div>

            <hr class="my-4" />

            <form id="salaryForm" class="needs-validation" novalidate>
              <div class="mb-3">
                <label for="basicSalary" class="form-label fw-semibold">Basic Salary</label>
                <input
                  type="number"
                  class="form-control"
                  id="basicSalary"
                  name="basicSalary"
                  min="0"
                  step="1"
                  inputmode="numeric"
                  autocomplete="off"
                  placeholder="Enter basic salary"
                />
                <div class="invalid-feedback" id="basicError">Please enter a valid number ≥ 0.</div>
                <div class="form-text">Accepts only numbers ≥ 0.</div>
              </div>

              <div class="d-flex gap-2 flex-wrap align-items-center">
                <button
                  type="button"
                  id="calculateBtn"
                  class="btn btn-primary"
                >
                  <span>Calculate Gross Salary</span>
                  <span
                    id="loadingSpinner"
                    class="spinner-border spinner-border-sm ms-2 d-none"
                    role="status"
                    aria-hidden="true"
                  ></span>
                </button>

                <button type="button" id="clearBtn" class="btn btn-outline-secondary">
                  Clear / Reset
                </button>
              </div>

              <div
                id="successMsg"
                class="alert alert-success mt-3 mb-0 d-none"
                role="alert"
              >
                Calculation completed successfully.
              </div>
            </form>

            <hr class="my-4" />

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <div class="p-3 border rounded bg-white">
                  <div class="text-muted small">Basic Salary</div>
                  <div class="fs-5 fw-semibold" id="outBasic">—</div>
                </div>
              </div>
              <div class="col-12 col-md-6">
                <div class="p-3 border rounded bg-white">
                  <div class="text-muted small">HRA</div>
                  <div class="fs-5 fw-semibold" id="outHra">—</div>
                </div>
              </div>

              <div class="col-12 col-md-6">
                <div class="p-3 border rounded bg-white">
                  <div class="text-muted small">DA</div>
                  <div class="fs-5 fw-semibold" id="outDa">—</div>
                </div>
              </div>
              <div class="col-12 col-md-6">
                <div class="p-3 border rounded bg-white">
                  <div class="text-muted small">Gross Salary</div>
                  <div class="fs-5 fw-semibold" id="outGross">—</div>
                </div>
              </div>
            </div>

            <div class="text-center text-muted small mt-3">
              <span class="me-1">Rules:</span>
              <span>HRA = 40% of Basic, DA = 25% of Basic</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
