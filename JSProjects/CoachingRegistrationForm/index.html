<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coaching Institute Registration Form</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <header>
      <h1>Coaching Institute Registration Form</h1>
    </header>

    <main>
      <div class="container row">
        <a href="./storage.html" class="ms-3 mb-3">View Saved Data (localStorage)</a>
        <form id="submitRegistrationform" class="card shadow-sm col-8 p-3">

          <div class="card-body">
            <div class="section-title mb-3 fs-3">Personal Information</div>
            <div class="row g-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="fullname" class="form-label">Full Name</label>
                  <input
                    type="text"
                    name="fullname"
                    id="fullname"
                    placeholder="Enter your full name"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="Enter your email"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label for="mobilenumber" class="form-label">Mobile</label>
                  <input
                    type="number"
                    name="mobilenumber"
                    id="mobilenumber"     
                    placeholder="Enter your number"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label for="dob" class="form-label">DOB</label>
                  <input
                    type="date"
                    name="dob"
                    id="dob"
                    class="form-control"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="mt-3">
              <div class="h6 mb-2">Gender</div>
              <div class="d-flex gap-4 flex-wrap">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="male"
                    value="male"
                  />
                  <label class="form-check-label" for="male">Male</label>
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="female"
                    value="female"
                  />
                  <label class="form-check-label" for="female">Female</label>
                </div>
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="other"
                    value="Other"
                  />
                  <label class="form-check-label" for="other">Other</label>
                </div>
              </div>
            </div>

            <div class="mt-4 section-title mb-3 fs-3">Academic Details</div>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label" for="personal"
                    >Last Qualification</label
                  >
                  <select
                    name="personal"
                    id="personal"
                    class="form-select"
                    required
                  >
                    <option disabled selected value="">
                      select your Last Completed Qualification
                    </option>
                    <option value="10th">10th</option>
                    <option value="12th">12th</option>
                    <option value="Graduate">Graduate</option>
                    <option value="Postgraduate">Postgraduate</option>
                  </select>
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label" for="grade">Percentage/Grade</label>
                  <select name="grade" id="grade" class="form-select" required>
                    <option disabled selected value="">
                      Percentage/Grade in Last Qualification
                    </option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="section-title mt-3 mb-3 fs-3">Course Information</div>

            <div class="mb-3">
              <label class="form-label" for="course">Course</label>
              <select name="course" id="course" class="form-select" required>
                <option value="" disabled selected>Select your course</option>
                <option value="IIT">IIT</option>
                <option value="JEE">JEE</option>
                <option value="NEET">NEET</option>
                <option value="Banking Exams">Banking Exams</option>
                <option value="UPSC">UPSC</option>
              </select>
            </div>

            <label class="section-title mt-3">Batch Timing</label>

            <div class="mb-3">
              <div class="d-flex flex-wrap gap-4">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="timings"
                    id="morning"
                    value="morning"
                  />
                  <label class="form-check-label" for="morning">Morning</label>
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="timings"
                    id="evening"
                    value="evening"
                  />
                  <label class="form-check-label" for="evening">Evening</label>
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="timings"
                    id="afterNoon"
                    value="afterNoon"
                  />
                  <label class="form-check-label" for="afterNoon"
                    >AfterNoon</label
                  >
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="timings"
                    id="weekends"
                    value="weekends"
                  />
                  <label class="form-check-label" for="weekends"
                    >Weekends</label
                  >
                </div>
              </div>
            </div>

            <div class="section-title mt-3 mb-3 fs-3">Address</div>

            <div class="mb-3">
              <label for="address" class="form-label"
                >Residential Address</label
              >
              <textarea
                name="address"
                id="address"
                class="form-control"
                placeholder="Enter your residential address"
              ></textarea>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="city" class="form-label">City</label>
                  <input
                    type="text"
                    name="city"
                    id="city"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label for="pincode" class="form-label">Pin Code</label>
                  <input
                    type="number"
                    name="pincode"
                    id="pincode"
                    class="form-control"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="section-title mt-3 mb-3 fs-3">Guardian Details</div>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="guardianFullName" class="form-label"
                    >Guardian’s Full Name</label
                  >
                  <input
                    type="text"
                    name="guardianFullName"
                    id="guardianFullName"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label for="guardianContactNumber" class="form-label"
                    >Guardian’s Contact Number</label
                  >
                  <input
                    type="number"
                    name="guardianContactNumber"
                    id="guardianContactNumber"
                    class="form-control"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-between flex-wrap gap-3 mt-3">
              <button
                type="submit"
                class="btn btn-outline-primary rounded-pill px-2"
              >
                Submit
              </button>
              <button
                type="reset"
                class="btn-warning btn shadow-none border-0 p-3"
                style="
                  border-top-left-radius: 20px;
                  border-bottom-right-radius: 20px;
                "
              >
                Reset
              </button>
            </div>
          </div>
        </form>
      </div>
    </main>

    <script src="./script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
