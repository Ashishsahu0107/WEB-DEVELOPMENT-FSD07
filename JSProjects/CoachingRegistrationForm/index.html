<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <header>
        <h1>Coaching Institute Registration Form</h1>
    </header>
    <main>
        <form id="submitRegistrationform">
            <div> Personal Information</div>
            <div class="form">
                <label for="fullname" class="form-label">Full Name</label>
                <input type="text" name="fullname" id="fullname" placeholder="Enter your full name" class="form-control"
                    >
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" class="form-control"
                    >
            </div>
            <div>
                <label for="mobilenumber">Mobile</label>
                <input type="number" name="mobilenumber" id="mobilenumber" placeholder="Enter your number"
                    class="form-control" >
            </div>
            <div>
                <label for="dob">DOB</label>
                <input type="date" name="dob" id="dob" placeholder="Enter your DOB" class="form-control" >
            </div>
            <div>
                <h2>Gender</h2>
                <label for="male">Male</label>
                <input type="radio" name="gender" id="male" value="male" ><br>
                <label for="female">Female</label>
                <input type="radio" name="gender" id="female" value="female" >
            </div>
            <div> Academic Details</div>

            <div>
                <select name="personal" id="personal" class="form-select">
                    <option>select your Last Completed Qualification</option>
                    <option value="">10th</option>
                    <option value="">12th</option>
                    <option value="">Graduate</option>
                    <option value="">Postgraduate</option>
                </select>
            </div>
            <div>
                <select name="" id="">
                    <option>Percentage/Grade in Last Qualification</option>
                    <option value="A">A</option>
                    <option value="">B</option>
                    <option value="">C</option>
                    <option value="">D</option>
                    <option value="">E</option>
                    <option value="">F</option>
                </select>
            </div>
            <div>Course Information</div>
            <div>
                <select name="" id="" class="form-control">
                    <option>Select your course</option>
                    <option value="">IIT</option>
                    <option value="">JEE</option>
                    <option value="">NEET</option>
                    <option value="">Banking Exams</option>
                    <option value="">UPSC</option>
                </select>
            </div>
            <div>
                <h2> Batch Timing</h2>
                <div class="d-flex justify-content-around">
                    <div class="d-flex gap-3" >
                        <label for="morning">Morning</label>
                        <input type="checkbox" class="form-check" name="timings" id="morning" value="morning">
                    </div>
                    <div class="d-flex gap-3">
                        <label for="evening">Evening</label>
                        <input type="checkbox" class="form-check" name="timings" id="evening" value="evening">
                    </div>
                    <div class="d-flex gap-3">
                        <label for="afterNoon">AfterNoon</label>
                        <input type="checkbox" class="form-check" name="timings" id="afterNoon" value="afterNoon">
                    </div>
                    <div class="d-flex gap-3">
                        <label for="weekends">Weekends</label>
                        <input type="checkbox" class="form-check" name="timings" id="weekends" value="weekends">
                    </div>
                </div>
            </div>
            <h2>Address</h2>
            <div>
                <label for="address" class="form-label">Residential Address</label>
                <textarea name="address" id="address" class="form-control"
                    placeholder="Enter your residential  address"></textarea>
            </div>
            <div>
                <label for="city">City</label>
                <input type="text" name="city" id="city">
            </div>
            <div>
                <label for="pincode">Pin Code</label>
                <input type="number" name="pincode" id="pincode">
            </div>

            <h2>Guardian Details</h2>
            <div>
                <label for="guardianFullName" class="form-label">Guardian’s Full Name</label>
                <input type="text" name="guardianFullName" id="guardianFullName">
            </div>
            <div>
                <label for="guardianContactNumber">Guardian’s Contact Number</label>
                <input type="number" name="guardianContactNumber" id="guardianContactNumber">
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-primary">Reset</button>
        </form>

    </main>



    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
