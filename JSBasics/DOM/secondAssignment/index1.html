<!doctype html>
<html>
  <head>
    <title>Assignment 1</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
   <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="d-flex justify-content-center mt-45 flex-row gap-5 ">
      <div class="form-box">
        <input type="text" id="name" placeholder="Name" required class="form-control" /><br /><br />
        <input type="text" id="city" placeholder="City" class="form-control" required /><br /><br />

        <button onclick="showData()" class="w-100 btn text-gray-500">Submit</button>

        <div id="result1"></div>
      </div>
      <div class="form-box">
        <input type="email" id="email" placeholder="Email" /><br /><br />
        <input
          type="password"
          id="password"
          placeholder="Password"
        /><br /><br />

        <button onclick="submitForm()">Submit</button>

        <div id="result2"></div>
      </div>
      <div class="form-box">
        <input
          type="text"
          id="fname"
          placeholder="First Name"
          required
        /><br /><br />
        <input
          type="text"
          id="lname"
          placeholder="Last Name"
          required
        /><br /><br />

        <button onclick="showFullName()">Submit</button>

        <div id="result3"></div>
      </div>
    </div>
    <script>



      function showData() {
        const name = document.getElementById("name").value;
        const city = document.getElementById("city").value;

        const result = document.getElementById("result1");
        result.innerText = `Name: ${name}, City: ${city}`;
        result.style.display = "block";
      }




      function submitForm() {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      const result = document.getElementById("result2");
      result.innerText = `Email: ${email}, Password: ${pass}`;
      result.style.display = "block";

      // background change
      document.body.style.backgroundColor = "#d1f7c4";
    }




    function showFullName() {
      const f = document.getElementById("fname").value;
      const l = document.getElementById("lname").value;

      const result = document.getElementById("result3");
      result.innerText = `Full Name: ${f} ${l}`;
      result.style.display = "block";
    }
    </script>

    <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
