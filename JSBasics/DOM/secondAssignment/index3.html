<body><!DOCTYPE html>
<html>
<head>
  <title>Assignment 3</title>
  <style>
    #result3 {
      margin-top: 10px;
      color: purple;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      padding: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <input type="text" id="fname" placeholder="First Name" required><br><br>
  <input type="text" id="lname" placeholder="Last Name" required><br><br>

  <button onclick="showFullName()">Submit</button>

  <div id="result3"></div>

  <script>
    function showFullName() {
      const f = document.getElementById("fname").value;
      const l = document.getElementById("lname").value;

      const result = document.getElementById("result3");
      result.innerText = `Full Name: ${f} ${l}`;
      result.style.display = "block";
    }
  </script>

</body>
</html>
