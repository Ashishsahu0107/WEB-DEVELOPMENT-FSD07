<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
</head>

<body>
    <header>
        <img src="./logo.png" alt="" />
    </header>

    <main class="login">
        <div class="login-right">
            <img src="./register.png" alt="" />
        </div>
        <div class="login-left">
            <div class="leftText">
                <h1>Register</h1>
                <p>Let’s get you all st up so you can access your personal account.</p>
                <div class="leftInner">
                    <div class="register">
                        <div class="register-inner">
                            <div class="input">
                                <label for="">First Name</label>
                                <input type="email" placeholder="Enter your first name" />
                            </div>
                            <div class="input">
                                <label for="">Last Name</label>
                                <input type="password" placeholder="Enter your last name" />

                            </div>
                        </div>
                        <div class="register-inner">
                            <div class="input">
                                <label for="">Email</label>
                                <input type="email" placeholder="Enter your Email" />
                            </div>
                            <div class="input">
                                <label for="">Phone Number</label>
                                <input type="password" placeholder="Enter your phone number" />

                            </div>
                        </div>
                    </div>
                    <div class="input">
                        <label for="">Password</label>
                        <input type="email" placeholder="Enter your password" />
                    </div>
                    <div class="input">
                        <label for="">Confirm Password</label>
                        <input type="password" placeholder="Confirm password" />

                    </div>
                    <div class="remember">
                        <div class="rememberme">
                            <input type="checkbox" name="" id="remember" />
                            <label for="remember">I agree to all the <span>Terms</span> and <span>Privacy Policies</span></label>
                        </div>
                    </div>
                    <button class="btn"><a href="#">Create account</a></button>
                    <p>Already have an account? <a href="./login.html">login</a></p>
                </div>
                <!-- <div id="horizontal-line">
                    <hr>
                    <span>Or login with</span>
                    <hr>
                </div> -->
                <!-- <div class="button">
                    <button> <img src="./facebook.png" alt=""><span>FaceBook</span></button>
                    <button> <img class="img" src="./google.png" alt=""><span>Google</span></button>
                    <button> <img class="img1" src="./apple.png" alt=""><span>Apple</span></button>
                </div> -->
            </div>
        </div>

    </main>
</body>

</html>
