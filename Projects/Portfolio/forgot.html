<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
</head>

<body>
    <header>
        <img src="./logo.png" alt="" />
        <button><a href=""></a></button>
    </header>

    <main class="login">
        <div class="login-left">
            <div class="leftText">
                <p><a href="./login.html">back to login</a></p>
                <h1>Forgot your password?</h1>
                <p>Don’t worry, happens to all of us. Enter your email below to recover your password</p>
                <div class="leftInner">
                    <div class="input">
                        <label for="">Email</label>
                        <input type="email" placeholder="Enter your Email" />
                    </div>
                    <button class="btn"><a href="#">Submit</a></button>
                    <p>Don't have an account <a href="./register.html">Sign up</a></p>
                </div>
                <div id="horizontal-line">
                    <hr>
                    <span>Or login with</span>
                    <hr>
                </div>
                <div class="button">
                    <button> <img class="img1" src="./facebook.png" alt=""><span>FaceBook</span></button>
                    <button> <img class="img2" src="./google.png" alt=""><span>Google</span></button>
                    <button> <img class="img3" src="./apple.png" alt=""><span>Apple</span></button>
                </div>
            </div>
        </div>
        <div class="login-right">
            <img src="./forgot.png" alt="" />
        </div>
    </main>
</body>

</html>
