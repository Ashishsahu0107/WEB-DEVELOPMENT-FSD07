<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./CSS/style.css" />
  </head>

  <body>
    <header>
      <nav
        class="navbar justify-content-between align-items-center px-5 position-static"
      >
        <a href="./home.html"
          ><img src="./Images/logo.png" alt="" class="px-5"
        /></a>
        <div class="d-flex gap-2 align-items-center">
          <button class="btn rounded h-50 text-white login">Login</button>
          <button class="btn rounded h-50 register btn-light">Register</button>
        </div>
      </nav>
    </header>
    <div
      id="carouselExampleAutoplaying"
      class="carousel slide position-relative"
      data-bs-ride="carousel"
    >
      <div class="carousel-inner">
        <div class="carousel-item active images">
          <img src="./Images/home1.jpg" class="d-block w-100" alt="..." />
        </div>
        <div class="carousel-item images">
          <img src="./Images/home2.jpg" class="d-block w-100" alt="..." />
        </div>
        <div class="carousel-item images">
          <img src="./Images/home3.jpg" class="d-block w-100" alt="..." />
        </div>
        <div
          class="image-position d-grid fs-5 justify-content-center align-items-center gap-4 text-white"
        >
          <div class="text-center">
            <h1 class="display-4 fw-bold">
              Your Favorite Food,<br />
              Delivered Fast
            </h1>
          </div>
          <div class="text-center">
            <p>
              Order from thousands of restaurants and get it delivered to your
              doorstep
            </p>
          </div>
          <div class="d-flex gap-3 justify-content-center">
            <button class="btn btn-toolbar">Sign Up</button>
            <button class="btn btn-light">Order Now</button>
          </div>
          <div class="d-flex form-control input">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control" />
          </div>
        </div>
      </div>
    </div>
    <section class="featuredRestaurants">
      <div class="container">
        <div class="container-fluid p-5">
          <h1>Featured Restaurants</h1>
          <p>3 restaurants available</p>
          <div class="card" style="width: 18rem">
            <img
              src="./Images/restaurant-card1.png"
              class="card-img-top"
              alt="..."
            />
            <div class="card-body">
              <h5>Under The Mango Tree</h5>
              <p class="card-text">
                Enjoy the thrill of grill and barbecue at Under The Mango Tree
                restaurant at Jehan Numa Palace, Bhopal. Head here now!
              </p>
              <div>
                <button class="btn btn-info">indian</button>
                <button class="btn btn-info">chineese</button>
                <button class="btn btn-info">ittalian</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
