<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar justify-content-between align-items-center px-5 position-static">
            <a href="./home.html"><img src="./Images/logo.png" alt="" class="px-5"></a>
            <div class="d-flex gap-2 align-items-center">
                <button class="btn rounded h-50 text-white login">Login</button>
                <button class="btn rounded h-50 register btn-outline-light">Register</button>
            </div>
        </nav>
    </header>
    <div id="carouselExampleAutoplaying" class="carousel slide position-relative" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active images">
                <img src="./Images/home1.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item images">
                <img src="./Images/home2.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item images">
                <img src="./Images/home3.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="container position-absolute bottom-50 h-25 d-grid justify-content-center align-items-center w-100 gap-3 text-white">
                <h1 class="text-center">Your Favorite Food, Delivered Fast</h1>
                <p>Order from thousands of restaurants and get it delivered to your doorstep</p>
                <div class="d-flex justify-content-center">
                    <button class="btn">Sign Up</button>
                    <button class="btn ">Order Now</button>
                </div>
                <div class="d-flex form-control">
                    <i class="bi bi-search" style="font-size: 2em; color: #007bff;"></i>
                    <input type="text" class="form-control">
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
